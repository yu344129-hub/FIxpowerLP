<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fix Power</title>
  <link rel="icon" href="./images/common/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="./images/common/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="./images/common/favicon-16x16.png" sizes="16x16">
  <link rel="apple-touch-icon" href="./images/common/apple-touch-icon.png">
  <link rel="manifest" href="./images/common/site.webmanifest">
  <meta name="theme-color" content="#0F172A">
  <script>
    // ---- 強制切替（デバッグ用）: ?view=sp / ?view=pc ----
    const params = new URLSearchParams(location.search);
    const forced = params.get("view");
    if (forced === "sp") location.replace("./sp.html");
    if (forced === "pc") location.replace("./pc.html");

    // ---- 端末判定 ----
    const ua = navigator.userAgent || "";
    const isIpad = (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1) || /iPad/.test(ua);
    const isAndroidTablet = /Android/.test(ua) && !/Mobile/.test(ua); // Android で Mobile が無い=タブレット判定
    const isTablet = isIpad || isAndroidTablet;

    // スマホ判定（幅ベース）
    const isPhone = window.matchMedia("(max-width: 768px)").matches;

    // 要件：スマホ・タブレット → sp.html / それ以外(PC) → pc.html
    const useSp = isPhone || isTablet;

    location.replace(useSp ? "./sp.html" : "./pc.html");
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=./pc.html">
  </noscript>
</head>
<body></body>
</html>
