/* === Floating Contact Button (added) === */
.floating-contact-btn{
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 99999;
  background: #FF7A00;
  color: #ffffff;
  font-weight: 700;
  text-decoration: none;
  border-radius: 999px;
  padding: 14px 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,.2);
  line-height: 1;
}
.floating-contact-btn:hover{ filter: brightness(.95); }
@media (max-width: 768px){
  .floating-contact-btn{ right: 18px; bottom: 18px; padding: 20px 24px; font-size: 30px; }
}


/* === CTA Hotspot hover/active effect (added) === */
.cta-hotspot{
  border-radius: 12px;
  background: rgba(255,122,0,0);
  transition: background .15s ease, transform .06s ease, box-shadow .15s ease;
  -webkit-tap-highlight-color: transparent;
}
@media (hover:hover){
  .cta-hotspot:hover{
    background: rgba(255,122,0,.18);
    box-shadow: 0 10px 24px rgba(0,0,0,.18);
  }
}
.cta-hotspot:active{
  background: rgba(255,122,0,.28);
  transform: scale(0.99);
}
.cta-hotspot:focus-visible{
  outline: 3px solid rgba(255,122,0,.55);
  outline-offset: 2px;
}


/* FVだけ“押した感”を強める（暗くなる＋軽く光る） */
.cta-hotspot--fv{
  border-radius: 14px;
}
@media (hover:hover){
  .cta-hotspot--fv:hover{
    background: rgba(255,122,0,.26);
    box-shadow:
      0 0 0 3px rgba(255,122,0,.22),
      0 14px 30px rgba(0,0,0,.22),
      0 0 28px rgba(255,122,0,.28);
  }
}
.cta-hotspot--fv:active{
  background: rgba(0,0,0,.22); /* 画像を少し暗く */
  box-shadow:
    0 0 0 3px rgba(255,122,0,.28),
    0 0 34px rgba(255,122,0,.45);
  transform: scale(0.985);
  filter: brightness(0.95);
}
