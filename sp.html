/* === Floating Contact Button (added) === */
.floating-contact-btn{
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 99999;
  background: #FF7A00;
  color: #ffffff;
  font-weight: 700;
  text-decoration: none;
  border-radius: 999px;
  padding: 14px 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,.2);
  line-height: 1;
}
.floating-contact-btn:hover{ filter: brightness(.95); }
@media (max-width: 768px){
  .floating-contact-btn{ right: 18px; bottom: 18px; padding: 20px 24px; font-size: 30px; }
}


/* === CTA Hotspot hover/active effect (added) === */
.cta-hotspot{
  border-radius: 12px;
  background: rgba(255,122,0,0);
  transition: background .15s ease, transform .06s ease, box-shadow .15s ease;
  -webkit-tap-highlight-color: transparent;
}
@media (hover:hover){
  .cta-hotspot:hover{
    background: rgba(255,122,0,.18);
    box-shadow: 0 10px 24px rgba(0,0,0,.18);
  }
}
.cta-hotspot:active{
  background: rgba(255,122,0,.28);
  transform: scale(0.99);
}
.cta-hotspot:focus-visible{
  outline: 3px solid rgba(255,122,0,.55);
  outline-offset: 2px;
}


/* FVだけ“押した感”を強める（暗くなる＋軽く光る） */
.cta-hotspot--fv{
  border-radius: 14px;
}
@media (hover:hover){
  .cta-hotspot--fv:hover{
    background: rgba(255,122,0,.26);
    box-shadow:
      0 0 0 3px rgba(255,122,0,.22),
      0 14px 30px rgba(0,0,0,.22),
      0 0 28px rgba(255,122,0,.28);
  }
}
.cta-hotspot--fv:active{
  background: rgba(0,0,0,.22); /* 画像を少し暗く */
  box-shadow:
    0 0 0 3px rgba(255,122,0,.28),
    0 0 34px rgba(255,122,0,.45);
  transform: scale(0.985);
  filter: brightness(0.95);
}

/* === Contact Form Page (added) === */
:root{
  --fp-navy: #0F172A;
  --fp-slate: #1E293B;
  --fp-muted: #64748B;
  --fp-border: #CBD5E1;
  --fp-bg: #F8FAFC;
  --fp-accent: #2563EB;
}
.contact-card{
  background: rgba(255,255,255,.92);
  border: 1px solid rgba(203,213,225,.75);
  border-radius: 18px;
  box-shadow: 0 14px 34px rgba(2,6,23,.12);
  backdrop-filter: blur(3px);
}
.contact-form label{
  display:block;
  font-weight:700;
  color: var(--fp-slate);
  font-size: 14px;
  margin-bottom: 6px;
}
.contact-form .required{
  color:#DC2626;
  font-weight:800;
  margin-left:6px;
  font-size: 12px;
}
.contact-form input,
.contact-form select,
.contact-form textarea{
  width:100%;
  border:1px solid var(--fp-border);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 16px;
  color: var(--fp-slate);
  background: rgba(255,255,255,.98);
}
.contact-form textarea{ min-height: 110px; resize: vertical; }
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus{
  outline: none;
  border-color: rgba(37,99,235,.75);
  box-shadow: 0 0 0 4px rgba(37,99,235,.18);
}
.contact-form .help{
  color: var(--fp-muted);
  font-size: 12px;
  margin-top: 6px;
}
.contact-submit{
  width:100%;
  background: #FF7A00;
  color:#fff;
  font-weight: 800;
  border-radius: 999px;
  padding: 14px 18px;
  box-shadow: 0 10px 24px rgba(0,0,0,.16);
}
.contact-submit:disabled{ opacity: .7; cursor:not-allowed; }
.contact-result{
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: 12px;
  background: rgba(37,99,235,.08);
  border: 1px solid rgba(37,99,235,.22);
  color: var(--fp-slate);
  font-weight: 700;
}

<script>
/* === Contact Form submit handler (added) ===
 * 1) Deploy Google Apps Script as Web App
 * 2) Replace the placeholder URL below with your Web App URL
 */
window.FIXPOWER_CONTACT_ENDPOINT = window.FIXPOWER_CONTACT_ENDPOINT || "YOUR_WEB_APP_URL_HERE";
(function(){
  const endpoint = window.FIXPOWER_CONTACT_ENDPOINT;
  const form = document.getElementById("contactForm");
  const resultEl = document.getElementById("contactResult");
  if(!form) return;

  function showResult(msg){
    if(!resultEl) return;
    resultEl.textContent = msg;
    resultEl.classList.remove("hidden");
  }

  form.addEventListener("submit", async function(ev){
    ev.preventDefault();

    if(!endpoint || endpoint.indexOf("YOUR_WEB_APP_URL_HERE") !== -1){
      showResult("送信先URL（Google Apps ScriptのWebアプリURL）が未設定です。HTML内の YOUR_WEB_APP_URL_HERE を置き換えてください。");
      return;
    }

    const submitBtn = form.querySelector('button[type="submit"]');
    const originalText = submitBtn ? submitBtn.textContent : "";
    if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = "送信中..."; }

    try{
      const fd = new FormData(form);
      fd.append("page_url", location.href);
      fd.append("user_agent", navigator.userAgent);

      // NOTE: mode:"no-cors" でCORSエラー回避（レスポンスは読めませんが送信はできます）
      await fetch(endpoint, { method: "POST", mode: "no-cors", body: fd });

      form.reset();
      showResult("送信ありがとうございました。ご入力のメールアドレス宛に自動返信メールを送信しました。");
      // (任意) 送信完了位置へスクロール
      try{ resultEl && resultEl.scrollIntoView({behavior:"smooth", block:"center"}); }catch(e){}
    }catch(e){
      showResult("送信に失敗しました。通信環境をご確認のうえ、再度お試しください。");
    }finally{
      if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = originalText || "無料で申し込む"; }
    }
  });
})();
</script>

  <!-- Floating contact button (added) -->
  <a class="floating-contact-btn" href="#contact" aria-label="お問い合わせフォームへ">お問い合わせ</a>

</body>
